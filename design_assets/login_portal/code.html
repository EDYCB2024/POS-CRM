<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>POS CRM | Secure Login</title>

<style>
        body {
            background-color: #f8f9ff;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .precision-bg {
            background: radial-gradient(circle at 0% 0%, rgba(0, 74, 198, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(0, 74, 198, 0.05) 0%, transparent 50%);
        }
    </style>

<body class="min-h-screen flex items-center justify-center precision-bg">
<main class="w-full max-w-md px-6 py-xl">
<!-- Logo & Branding -->
<div class="flex flex-col items-center mb-xl">
<div class="mb-md flex items-center justify-center w-12 h-12 bg-primary rounded-xl text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">point_of_sale</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">POS CRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Precision Performance Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl">
<header class="mb-lg">
<h2 class="font-h2 text-h2 text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Access your terminal dashboard</p>
</header>
<form action="#" class="space-y-lg">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-transparent border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-transparent border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-md">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full py-md px-lg bg-primary text-on-primary font-h3 text-body-lg rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<footer class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Authorized access only. 
                    <a class="text-primary font-semibold hover:underline" href="#">Contact Support</a>
</p>
</footer>
</div>
<!-- System Status Indicator (Quiet Luxury Detail) -->
<div class="mt-xl flex items-center justify-center gap-md py-md px-lg bg-surface-container-low rounded-full border border-outline-variant/30">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Global Terminals Operational</span>
</div>
</main>
<!-- Background Decorative Image (Subtle Narrative Aesthetic) -->
<div class="fixed inset-0 -z-10 overflow-hidden opacity-[0.03] pointer-events-none">

</div>
